<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Rozzheal</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Rozzheal"/>
  <meta name="theme-color" content="#071620"/>
  <style>
    html,body,#root{margin:0;padding:0;min-height:100%;background:#071620}
    *{box-sizing:border-box}

    /* ── iPhone 16 Pro — Dynamic Island + home bar safe areas ── */
    :root {
      --sat: env(safe-area-inset-top, 59px);
      --sab: env(safe-area-inset-bottom, 34px);
    }
    /* Push entire app below status bar */
    body {
      padding-top: env(safe-area-inset-top, 59px);
      padding-bottom: env(safe-area-inset-bottom, 34px);
      background: #071620;
    }
  </style>
</head>
